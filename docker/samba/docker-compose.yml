services:
  samba:
    image: dperson/samba:latest
    container_name: samba
    restart: no
    environment:
      - TZ=Asia/Almaty
    volumes:
      - ./smb.conf:/etc/samba/smb.conf:ro
      - vault:/share/vault
      - gallery:/share/gallery
      - books:/share/books
    networks:
      - utsuwa

volumes:
  vault:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/encrypted/vault
  gallery:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/data/gallery
  books:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/data/books

networks:
  utsuwa:
    name: utsuwa-net
